<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>VECTOR — Crash Prototype</title>
<meta name="description" content="VECTOR: a sci-fi crash game prototype with an Overdrive risk mechanic." />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ============================================================
     HEADER
     ============================================================ -->
<header class="app-header">
  <div class="brand">
    <span class="brand-mark" aria-hidden="true">
      <svg viewBox="0 0 32 32" width="26" height="26" focusable="false">
        <polygon points="16,2 29,26 16,20 3,26" fill="currentColor"/>
      </svg>
    </span>
    <span class="brand-name">VECTOR</span>
    <button class="fair-badge" id="fairBadge" type="button" aria-haspopup="dialog" aria-expanded="false">
      <svg viewBox="0 0 20 20" width="12" height="12" aria-hidden="true"><path fill="currentColor" d="M10 1l7 3v5c0 5-3.4 8.7-7 10-3.6-1.3-7-5-7-10V4l7-3z"/></svg>
      Provably Fair
    </button>
    <div class="fair-popover" id="fairPopover" role="dialog" aria-label="Provably fair details" hidden>
      <p class="fair-popover-title">Round Verification</p>
      <dl>
        <dt>Round</dt><dd id="fairRound">—</dd>
        <dt>Server Seed Hash</dt><dd id="fairSeed">—</dd>
        <dt>Result</dt><dd id="fairResult">—</dd>
      </dl>
      <p class="fair-popover-note">The crash point is generated and cryptographically committed before the round starts. Player actions cannot influence it.</p>
    </div>
  </div>

  <div class="header-right">
    <div class="balance" role="status" aria-live="polite">
      <span class="balance-label">Balance</span>
      <span class="balance-value" id="balanceValue">$0.00</span>
    </div>
    <button class="icon-btn" id="soundToggle" type="button" aria-pressed="false" aria-label="Toggle sound">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M4 9v6h4l5 5V4L8 9H4z"/></svg>
    </button>
    <button class="icon-btn" id="settingsBtn" type="button" aria-label="Settings">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M19.4 13a7.6 7.6 0 000-2l2-1.6-2-3.4-2.4 1a7.6 7.6 0 00-1.7-1L15 3h-4l-.3 2.6a7.6 7.6 0 00-1.7 1l-2.4-1-2 3.4L6.6 11a7.6 7.6 0 000 2l-2 1.6 2 3.4 2.4-1a7.6 7.6 0 001.7 1L11 21h4l.3-2.6a7.6 7.6 0 001.7-1l2.4 1 2-3.4-2-1.6z"/></svg>
    </button>
  </div>
</header>

<!-- ============================================================
     APP LAYOUT
     ============================================================ -->
<div class="app-layout">

  <!-- ---------------- GAME COLUMN ---------------- -->
  <main class="game-column">

    <section class="game-stage" id="gameStage" aria-label="Round visualization">
      <canvas id="tunnelCanvas" aria-hidden="true"></canvas>

      <div class="stage-overlay">
        <div class="stage-top">
          <span class="mode-label" id="modeLabel">CRUISE</span>
        </div>

        <div class="multiplier-wrap">
          <div class="multiplier" id="multiplierValue" role="status" aria-live="polite" aria-atomic="true">1.00x</div>
          <div class="result-banner" id="resultBanner" hidden></div>
        </div>

        <div class="countdown-wrap" id="countdownWrap">
          <span id="countdownText">Next run in 3.0s</span>
        </div>
      </div>

      <div class="crash-flash" id="crashFlash" aria-hidden="true"></div>
    </section>

    <!-- ---------------- BETTING PANEL ---------------- -->
    <section class="betting-panel" aria-label="Place your bet">

      <div class="bet-controls">
        <div class="bet-amount-field">
          <label for="betAmountInput" class="field-label">Bet Amount</label>
          <div class="amount-stepper">
            <button type="button" class="stepper-btn" id="betDecrease" aria-label="Decrease bet amount">−</button>
            <div class="amount-input-wrap">
              <span class="currency-sign" aria-hidden="true">$</span>
              <input type="number" id="betAmountInput" inputmode="decimal" min="1" step="1" value="10" aria-label="Bet amount in dollars" />
            </div>
            <button type="button" class="stepper-btn" id="betIncrease" aria-label="Increase bet amount">+</button>
          </div>
          <div class="quick-chips" role="group" aria-label="Quick bet amounts">
            <button type="button" class="chip" data-amount="10">$10</button>
            <button type="button" class="chip" data-amount="25">$25</button>
            <button type="button" class="chip" data-amount="50">$50</button>
            <button type="button" class="chip" data-amount="100">$100</button>
          </div>
        </div>

        <div class="auto-cashout-field">
          <div class="field-label-row">
            <label for="autoCashoutValue" class="field-label">Auto Cashout</label>
            <button type="button" class="toggle" id="autoCashoutToggle" role="switch" aria-checked="false" aria-label="Enable auto cashout">
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </button>
          </div>
          <div class="amount-input-wrap auto-input">
            <input type="number" id="autoCashoutValue" inputmode="decimal" min="1.01" step="0.1" value="2.00" aria-label="Auto cashout multiplier" disabled />
            <span class="x-suffix" aria-hidden="true">x</span>
          </div>
        </div>
      </div>

      <div class="action-row">
        <button type="button" class="btn btn-overdrive" id="overdriveBtn" disabled aria-label="Activate Overdrive, once per round">
          <span class="btn-icon" aria-hidden="true">⚡</span>
          <span id="overdriveBtnLabel">ACTIVATE OVERDRIVE</span>
        </button>
        <button type="button" class="btn btn-main" id="mainActionBtn" aria-live="polite">
          <span id="mainActionLabel">PLACE BET</span>
        </button>
      </div>
    </section>
  </main>

  <!-- ---------------- SIDE PANEL ---------------- -->
  <aside class="side-panel" id="sidePanel" aria-label="Bets and history">
    <button class="panel-toggle" id="panelToggle" aria-expanded="true" aria-controls="panelBody">
      <span id="panelToggleLabel">Show panel</span>
      <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M7 10l5 5 5-5z"/></svg>
    </button>

    <div class="panel-body" id="panelBody">
      <div class="tabs" role="tablist" aria-label="Bet views">
        <button class="tab active" id="tabLive" role="tab" aria-selected="true" aria-controls="panelLive">Live Bets</button>
        <button class="tab" id="tabHistory" role="tab" aria-selected="false" aria-controls="panelHistory">History</button>
      </div>

      <div class="panel-content" id="panelLive" role="tabpanel" aria-labelledby="tabLive">
        <ul class="bet-list" id="liveBetsList" aria-live="off"></ul>
      </div>

      <div class="panel-content" id="panelHistory" role="tabpanel" aria-labelledby="tabHistory" hidden>
        <ul class="history-list" id="historyList"></ul>
      </div>
    </div>
  </aside>

</div>

<script src="script.js"></script>
</body>
</html>
